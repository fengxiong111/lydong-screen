<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>律动情报屏</title>
  <style>
    :root{
      --bg:#020202;--line:rgba(255,255,255,.012);--text:#f7f7f2;
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",Arial,sans-serif}
    html,body{height:100%;overflow:hidden}
    .viewport{position:fixed;inset:0;overflow:hidden;background:var(--bg)}
    .scroll-layer{will-change:transform}
    html.mobile, html.mobile body{height:auto;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch}
    html.mobile body{min-height:100vh}
    .mobile .viewport{position:relative;inset:auto;overflow:visible;min-height:100vh}
    .mobile .scroll-layer{will-change:auto;transform:none !important}
    .app{width:min(100vw,2520px);margin:0 auto;padding:22px 78px 38px}
    .feed{padding-top:0}
    .item{padding:16px 0 18px;border-bottom:1px solid transparent;transform-origin:center center;opacity:1;transform:translate3d(0,0,0) scale(1)}
    .item + .item{margin-top:2px}
    .item:first-child{padding-top:10px;padding-bottom:34px;margin-bottom:10px;border-bottom-color:rgba(255,255,255,.018)}
    .item:nth-child(2){padding-top:20px;padding-bottom:26px;margin-bottom:12px;border-bottom-color:rgba(255,255,255,.014)}
    .item:nth-child(n+3):nth-child(-n+6){padding-top:11px;padding-bottom:13px}
    .item:nth-child(n+7){padding-top:9px;padding-bottom:11px}
    .item.entering{opacity:0;transform:translate3d(0,18px,0) scale(.995)}
    .headline{width:100%;max-width:24.2ch;font-size:clamp(28px,3.28vw,58px);line-height:1.17;font-weight:510;letter-spacing:-.017em;color:rgba(247,247,242,.79);word-break:normal;overflow-wrap:normal;line-break:strict;text-wrap:balance;transition:opacity .18s linear, transform .18s linear}
    .item:first-child .headline{max-width:22.1ch;font-size:clamp(40px,4.45vw,78px);line-height:1.08;font-weight:615;letter-spacing:-.024em;color:rgba(247,247,242,.955);text-wrap:balance}
    .item:nth-child(2) .headline{max-width:23ch;font-size:clamp(35px,4.02vw,70px);line-height:1.12;font-weight:575;color:rgba(247,247,242,.905);letter-spacing:-.019em;text-wrap:balance}
    .item:nth-child(n+3):nth-child(-n+6) .headline{max-width:24.4ch;font-size:clamp(29px,3.28vw,55px);line-height:1.19;font-weight:520;color:rgba(247,247,242,.825);text-wrap:pretty}
    .item:nth-child(n+7) .headline{max-width:24.6ch;font-size:clamp(26px,3.02vw,49px);line-height:1.19;font-weight:505;color:rgba(247,247,242,.775);text-wrap:pretty}
    .item:nth-child(n+7) .meta{color:rgba(247,247,242,.34)}
    .meta{margin-top:8px;font-size:clamp(12px,1.02vw,15px);line-height:1.24;font-weight:470;letter-spacing:.01em;color:rgba(247,247,242,.38)}
    .item:first-child .meta{color:rgba(247,247,242,.44)}
    .item:nth-child(2) .meta{color:rgba(247,247,242,.4)}
    .empty{padding:48px 0;color:#777;font-size:24px}
    .mask{position:fixed;left:0;right:0;height:12vh;pointer-events:none;z-index:5}
    .mask-bottom{bottom:0;background:linear-gradient(0deg,rgba(2,2,2,.36) 0%,rgba(2,2,2,.18) 34%,rgba(2,2,2,.08) 64%,rgba(2,2,2,0) 100%)}
    @media (max-width: 1024px){
      .mobile .mask{display:none}
      .mobile .item,.mobile .headline{transition:none !important}
    }
    @media (max-width: 900px){
      .app{padding:10px 22px 26px}
      .item{padding:14px 0 17px}
      .item:first-child{padding-top:3px;padding-bottom:24px;margin-bottom:8px}
      .item:nth-child(2){padding-top:15px;padding-bottom:21px;margin-bottom:9px}
      .item:nth-child(n+3):nth-child(-n+6){padding-top:10px;padding-bottom:13px}
      .item:nth-child(n+7){padding-top:9px;padding-bottom:11px}
      .headline{max-width:100%;font-size:clamp(23px,6.85vw,40px);line-height:1.19;font-weight:500}
      .item:first-child .headline{max-width:100%;font-size:clamp(32px,8.55vw,52px);line-height:1.08;font-weight:608}
      .item:nth-child(2) .headline{max-width:100%;font-size:clamp(29px,7.95vw,48px);line-height:1.12;font-weight:575;color:rgba(247,247,242,.9)}
      .item:nth-child(n+3):nth-child(-n+6) .headline{max-width:100%;font-size:clamp(25px,6.95vw,42px);line-height:1.17;font-weight:520;color:rgba(247,247,242,.825)}
      .item:nth-child(n+7) .headline{max-width:100%;font-size:clamp(22px,6.35vw,36px);line-height:1.18;font-weight:500;color:rgba(247,247,242,.77)}
      .meta{margin-top:6px;font-size:12px;color:rgba(247,247,242,.38)}
      .mask{height:8vh}
    }
    @media (prefers-reduced-motion: reduce){
      .item,.headline{transition:none}
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="mask mask-bottom"></div>
    <div class="scroll-layer" id="scrollLayer">
      <div class="app">
        <main class="feed" id="feed"></main>
      </div>
    </div>
  </div>

  <script>
    const feedEl = document.getElementById('feed');
    const viewportEl = document.getElementById('viewport');
    const scrollLayerEl = document.getElementById('scrollLayer');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isMobile = window.matchMedia('(pointer: coarse), (max-width: 1024px)').matches;
    if (isMobile) document.documentElement.classList.add('mobile');
    let targetY = 0;
    let currentY = 0;
    let firstRender = true;
    let touchStartY = null;
    let previousFeedIds = [];
    let lastRenderSignature = "";

    function escapeHtml(text='') {
      return text.replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }

    function clampScroll(value) {
      const minY = Math.min(0, viewportEl.clientHeight - scrollLayerEl.scrollHeight);
      return Math.max(minY, Math.min(0, value));
    }

    function buildSignature(items) {
      return Array.isArray(items) ? items.map(item => `${item.id}::${item.title || ""}::${item.ts || ""}`).join("\n") : "";
    }

    function formatRelativeTime(ts) {
      if (!ts) return '';
      const date = new Date(ts);
      if (Number.isNaN(date.getTime())) return '';
      const diff = Math.max(0, Date.now() - date.getTime());
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return `${mins} 分钟前`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} 小时前`;
      const days = Math.floor(hours / 24);
      return `${days} 天前`;
    }

    function updateVisuals() {
      if (isMobile) return;
      const center = window.innerHeight / 2;
      feedEl.querySelectorAll('.item').forEach((item) => {
        const rect = item.getBoundingClientRect();
        const itemCenter = rect.top + rect.height / 2;
        const distance = Math.min(1, Math.abs(itemCenter - center) / (window.innerHeight * 0.65));
        const opacity = reduceMotion ? 1 : 1 - distance * 0.28;
        const scale = reduceMotion ? 1 : 1 - distance * 0.018;
        item.style.opacity = opacity.toFixed(3);
        item.style.transform = `translate3d(0,0,0) scale(${scale.toFixed(4)})`;
      });
    }

    function animate() {
      if (isMobile) return;
      currentY = reduceMotion ? targetY : currentY + (targetY - currentY) * 0.12;
      if (Math.abs(targetY - currentY) < 0.1) currentY = targetY;
      scrollLayerEl.style.transform = `translate3d(0, ${currentY}px, 0)`;
      updateVisuals();
      requestAnimationFrame(animate);
    }

    function createItem(item, entering) {
      const article = document.createElement('article');
      article.className = 'item';
      article.dataset.id = item.id;
      const headline = document.createElement("div");
      headline.className = "headline";
      headline.textContent = item.title || "";
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = formatRelativeTime(item.ts);
      article.appendChild(headline);
      article.appendChild(meta);
      if (entering && !reduceMotion) {
        article.classList.add('entering');
        requestAnimationFrame(() => article.classList.remove('entering'));
      }
      return article;
    }

    function render(items) {
      if (!Array.isArray(items) || !items.length) {
        feedEl.innerHTML = '<div class="empty">暂无情报</div>';
        return;
      }
      const signature = buildSignature(items);
      if (signature === lastRenderSignature) return;
      lastRenderSignature = signature;
      const existing = new Map([...feedEl.querySelectorAll('.item')].map(node => [node.dataset.id, node]));
      const nextIds = items.map(item => String(item.id));
      const fragment = document.createDocumentFragment();
      for (const item of items) {
        const id = String(item.id);
        let node = existing.get(id);
        if (!node) {
          const entering = !firstRender && !previousFeedIds.includes(id);
          node = createItem(item, entering);
        } else {
          const textEl = node.querySelector('.headline');
          if (textEl && textEl.textContent !== (item.title || '')) textEl.textContent = item.title || '';
          const metaEl = node.querySelector('.meta');
          if (metaEl) metaEl.textContent = formatRelativeTime(item.ts);
        }
        fragment.appendChild(node);
      }
      feedEl.replaceChildren(fragment);
      previousFeedIds = nextIds;
      if (firstRender) {
        targetY = currentY = 0;
        if (!isMobile) scrollLayerEl.style.transform = 'translate3d(0,0,0)';
        firstRender = false;
      } else if (!isMobile) {
        targetY = clampScroll(targetY);
      }
      updateVisuals();
    }

    async function loadFeed() {
      try {
        const res = await fetch(`./feed.json?t=${Date.now()}`, {cache:'no-store'});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        render(Array.isArray(data) ? [...data].reverse() : data);
      } catch (e) {
        feedEl.innerHTML = '<div class="empty">真实 feed 暂不可用</div>';
      }
    }

    if (!isMobile) {
      viewportEl.addEventListener('wheel', (e) => {
        e.preventDefault();
        targetY = clampScroll(targetY - e.deltaY);
      }, {passive:false});

      viewportEl.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      }, {passive:true});

      viewportEl.addEventListener('touchmove', (e) => {
        if (touchStartY == null) return;
        const y = e.touches[0].clientY;
        const delta = y - touchStartY;
        touchStartY = y;
        targetY = clampScroll(targetY + delta);
      }, {passive:true});

      viewportEl.addEventListener('touchend', () => {
        touchStartY = null;
      }, {passive:true});

      window.addEventListener('resize', () => {
        targetY = clampScroll(targetY);
        currentY = clampScroll(currentY);
        updateVisuals();
      });

      requestAnimationFrame(animate);
    }
    loadFeed();
    setInterval(loadFeed, 30000);
  </script>
</body>
</html>
