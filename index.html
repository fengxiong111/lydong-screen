<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>律动情报屏</title>
  <style>
    :root{
      --bg:#020202;--line:rgba(255,255,255,.028);--text:#f7f7f2;
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",Arial,sans-serif}
    html,body{height:100%;overflow:hidden}
    .viewport{position:fixed;inset:0;overflow:hidden;background:var(--bg)}
    .scroll-layer{will-change:transform}
    .mobile .viewport{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
    .mobile .scroll-layer{will-change:auto;transform:none !important}
    .app{width:min(100vw,2400px);margin:0 auto;padding:18px 42px 44px}
    .feed{padding-top:0}
    .item{padding:18px 0 22px;border-bottom:1px solid var(--line);transform-origin:center center;opacity:1;transform:translate3d(0,0,0) scale(1)}
    .item + .item{margin-top:4px}
    .item:first-child{padding-top:8px;padding-bottom:38px;margin-bottom:14px}
    .item:nth-child(2){padding-top:18px;padding-bottom:25px}
    .item:nth-child(3){padding-top:16px;padding-bottom:24px}
    .item.entering{opacity:0;transform:translate3d(0,18px,0) scale(.995)}
    .headline{width:100%;max-width:20ch;font-size:clamp(29px,3.5vw,64px);line-height:1.17;font-weight:520;letter-spacing:-.018em;color:rgba(247,247,242,.82);word-break:normal;overflow-wrap:normal;line-break:strict;text-wrap:balance;transition:opacity .18s linear, transform .18s linear}
    .headline .nowrap{white-space:nowrap}
    .item:first-child .headline{max-width:18.4ch;font-size:clamp(42px,4.8vw,88px);line-height:1.06;font-weight:620;letter-spacing:-.025em;color:rgba(247,247,242,.95)}
    .item:nth-child(2) .headline{max-width:19.2ch;font-size:clamp(37px,4.25vw,78px);line-height:1.11;font-weight:590;color:rgba(247,247,242,.92)}
    .item:nth-child(3) .headline{max-width:19.6ch;font-size:clamp(34px,3.95vw,70px);line-height:1.13;font-weight:560;color:rgba(247,247,242,.88)}
    .empty{padding:48px 0;color:#777;font-size:24px}
    .mask{position:fixed;left:0;right:0;height:12vh;pointer-events:none;z-index:5}
    .mask-bottom{bottom:0;background:linear-gradient(0deg,rgba(2,2,2,.36) 0%,rgba(2,2,2,.18) 34%,rgba(2,2,2,.08) 64%,rgba(2,2,2,0) 100%)}
    @media (max-width: 1024px){
      .mobile .mask{display:none}
      .mobile html,.mobile body{overflow:auto}
      .mobile .item,.mobile .headline{transition:none !important}
    }
    @media (max-width: 900px){
      .app{padding:10px 18px 26px}
      .item{padding:14px 0 18px}
      .item:first-child{padding-top:2px;padding-bottom:26px;margin-bottom:8px}
      .item:nth-child(2){padding-top:13px;padding-bottom:20px}
      .item:nth-child(3){padding-top:12px;padding-bottom:19px}
      .headline{max-width:100%;font-size:clamp(24px,7.1vw,42px);line-height:1.19;font-weight:500}
      .item:first-child .headline{max-width:100%;font-size:clamp(32px,8.9vw,54px);line-height:1.08;font-weight:600}
      .item:nth-child(2) .headline{max-width:100%;font-size:clamp(29px,8vw,49px);line-height:1.12;font-weight:570}
      .item:nth-child(3) .headline{max-width:100%;font-size:clamp(27px,7.5vw,45px);line-height:1.14;font-weight:550}
      .mask{height:8vh}
    }
    @media (prefers-reduced-motion: reduce){
      .item,.headline{transition:none}
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="mask mask-bottom"></div>
    <div class="scroll-layer" id="scrollLayer">
      <div class="app">
        <main class="feed" id="feed"></main>
      </div>
    </div>
  </div>

  <script>
    const feedEl = document.getElementById('feed');
    const viewportEl = document.getElementById('viewport');
    const scrollLayerEl = document.getElementById('scrollLayer');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isMobile = window.matchMedia('(pointer: coarse), (max-width: 1024px)').matches;
    if (isMobile) document.documentElement.classList.add('mobile');
    let targetY = 0;
    let currentY = 0;
    let firstRender = true;
    let touchStartY = null;
    let previousFeedIds = [];
    let lastRenderSignature = "";

    function escapeHtml(text='') {
      return text.replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }

    function clampScroll(value) {
      const minY = Math.min(0, viewportEl.clientHeight - scrollLayerEl.scrollHeight);
      return Math.max(minY, Math.min(0, value));
    }

    function formatHeadline(text='') {
      const escaped = escapeHtml(text);
      return escaped
        .replace(/(\d+(?:\.\d+)?(?:%|％|万美元|亿美元|万亿|亿元|万人|万枚|枚|人|家|倍|点|个基点|基点|小时|分钟|天|周|月|年))/g, '<span class="nowrap">$1</span>')
        .replace(/(\d+月\d+日)/g, '<span class="nowrap">$1</span>')
        .replace(/([A-Z]{2,}(?:\/[A-Z]{2,})?)/g, '<span class="nowrap">$1</span>');
    }

    function buildSignature(items) {
      return Array.isArray(items) ? items.map(item => `${item.id}::${item.title || ""}`).join("\n") : "";
    }

    function updateVisuals() {
      if (isMobile) return;
      const center = window.innerHeight / 2;
      feedEl.querySelectorAll('.item').forEach((item) => {
        const rect = item.getBoundingClientRect();
        const itemCenter = rect.top + rect.height / 2;
        const distance = Math.min(1, Math.abs(itemCenter - center) / (window.innerHeight * 0.65));
        const opacity = reduceMotion ? 1 : 1 - distance * 0.28;
        const scale = reduceMotion ? 1 : 1 - distance * 0.018;
        item.style.opacity = opacity.toFixed(3);
        item.style.transform = `translate3d(0,0,0) scale(${scale.toFixed(4)})`;
      });
    }

    function animate() {
      if (isMobile) return;
      currentY = reduceMotion ? targetY : currentY + (targetY - currentY) * 0.12;
      if (Math.abs(targetY - currentY) < 0.1) currentY = targetY;
      scrollLayerEl.style.transform = `translate3d(0, ${currentY}px, 0)`;
      updateVisuals();
      requestAnimationFrame(animate);
    }

    function createItem(item, entering) {
      const article = document.createElement('article');
      article.className = 'item';
      article.dataset.id = item.id;
      article.innerHTML = `<div class="headline">${formatHeadline(item.title || '')}</div>`;
      if (entering && !reduceMotion) {
        article.classList.add('entering');
        requestAnimationFrame(() => article.classList.remove('entering'));
      }
      return article;
    }

    function render(items) {
      if (!Array.isArray(items) || !items.length) {
        feedEl.innerHTML = '<div class="empty">暂无情报</div>';
        return;
      }
      const signature = buildSignature(items);
      if (signature === lastRenderSignature) return;
      lastRenderSignature = signature;
      const existing = new Map([...feedEl.querySelectorAll('.item')].map(node => [node.dataset.id, node]));
      const nextIds = items.map(item => String(item.id));
      const fragment = document.createDocumentFragment();
      for (const item of items) {
        const id = String(item.id);
        let node = existing.get(id);
        if (!node) {
          const entering = !firstRender && !previousFeedIds.includes(id);
          node = createItem(item, entering);
        } else {
          const textEl = node.querySelector('.headline');
          if (textEl && textEl.textContent !== (item.title || '')) textEl.textContent = item.title || '';
        }
        fragment.appendChild(node);
      }
      feedEl.replaceChildren(fragment);
      previousFeedIds = nextIds;
      if (firstRender) {
        targetY = currentY = 0;
        if (!isMobile) scrollLayerEl.style.transform = 'translate3d(0,0,0)';
        firstRender = false;
      } else if (!isMobile) {
        targetY = clampScroll(targetY);
      }
      updateVisuals();
    }

    async function loadFeed() {
      try {
        const res = await fetch(`./feed.json?t=${Date.now()}`, {cache:'no-store'});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        render(Array.isArray(data) ? [...data].reverse() : data);
      } catch (e) {
        feedEl.innerHTML = '<div class="empty">真实 feed 暂不可用</div>';
      }
    }

    if (!isMobile) {
      viewportEl.addEventListener('wheel', (e) => {
        e.preventDefault();
        targetY = clampScroll(targetY - e.deltaY);
      }, {passive:false});

      viewportEl.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      }, {passive:true});

      viewportEl.addEventListener('touchmove', (e) => {
        if (touchStartY == null) return;
        const y = e.touches[0].clientY;
        const delta = y - touchStartY;
        touchStartY = y;
        targetY = clampScroll(targetY + delta);
      }, {passive:true});

      viewportEl.addEventListener('touchend', () => {
        touchStartY = null;
      }, {passive:true});

      window.addEventListener('resize', () => {
        targetY = clampScroll(targetY);
        currentY = clampScroll(currentY);
        updateVisuals();
      });

      requestAnimationFrame(animate);
    }
    loadFeed();
    setInterval(loadFeed, 30000);
  </script>
</body>
</html>
